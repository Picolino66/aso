<!doctype html>
<html lang="pt-br">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ASO Runtime — Projetos</title>
  <style>
    :root {
      --bg:#0f172a; --panel:#1e293b; --panel2:#0b1220; --border:#334155;
      --fg:#e2e8f0; --muted:#94a3b8; --accent:#38bdf8; --ok:#22c55e;
      --warn:#f59e0b; --err:#ef4444; --info:#818cf8; --radius:10px;
    }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family:ui-sans-serif,system-ui,sans-serif; background:var(--bg); color:var(--fg); }
    header { position:sticky; top:0; z-index:5; display:flex; gap:10px; align-items:center; flex-wrap:wrap; padding:14px 24px; background:var(--panel); border-bottom:1px solid var(--border); }
    header h1 { margin:0; font-size:18px; } header .spacer { flex:1; }
    button, input, textarea, select { font:inherit; }
    button { border:0; border-radius:8px; padding:8px 12px; font-size:13px; font-weight:650; cursor:pointer; background:var(--accent); color:#08131f; }
    button:hover { opacity:.86; } button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible { outline:2px solid var(--accent); outline-offset:2px; }
    button.ghost { background:var(--border); color:var(--fg); } button.ok { background:var(--ok); } button.err { background:var(--err); color:#fff; } button.info { background:var(--info); color:#fff; }
    button.sm { padding:5px 8px; font-size:12px; } button:disabled { opacity:.45; cursor:not-allowed; }
    input, textarea, select { width:100%; padding:8px 10px; color:var(--fg); background:var(--panel2); border:1px solid var(--border); border-radius:8px; }
    textarea { min-height:76px; resize:vertical; }
    .toolbar { display:flex; gap:12px; align-items:center; flex-wrap:wrap; padding:14px 24px; }
    .toolbar label { display:flex; gap:7px; align-items:center; color:var(--muted); font-size:13px; }
    .toolbar input[type=checkbox] { width:auto; }
    main { padding:0 24px 24px; }
    .project { margin-bottom:16px; border:1px solid var(--border); border-radius:var(--radius); background:var(--panel); overflow:hidden; }
    .project summary { display:flex; gap:12px; align-items:center; padding:13px 15px; cursor:pointer; list-style:none; }
    .project summary::-webkit-details-marker { display:none; }
    .project-title { min-width:0; flex:1; } .project-title h2 { margin:0 0 4px; font-size:15px; }
    .meta, .empty, .status { color:var(--muted); font-size:12px; overflow-wrap:anywhere; }
    .actions { display:flex; gap:6px; flex-wrap:wrap; }
    .pill { display:inline-block; border-radius:999px; padding:2px 8px; font-size:11px; background:var(--border); }
    .pill.archived { color:var(--warn); background:rgba(245,158,11,.16); }
    .board { display:flex; gap:10px; overflow-x:auto; padding:0 12px 14px; }
    .column { flex:0 0 190px; padding:9px; border:1px solid var(--border); border-radius:9px; background:var(--panel2); }
    .column h3 { display:flex; justify-content:space-between; margin:0 0 8px; color:var(--muted); font-size:11px; text-transform:uppercase; }
    .card { margin-bottom:7px; padding:8px; border:1px solid var(--border); border-radius:8px; background:var(--panel); cursor:pointer; }
    .card:hover { border-color:var(--accent); } .card strong { display:block; font-size:12px; line-height:1.35; }
    .card small { color:var(--muted); font-size:10px; }
    .empty { padding:32px; text-align:center; }
    .overlay { position:fixed; inset:0; z-index:20; display:flex; align-items:center; justify-content:center; padding:16px; background:rgba(2,6,23,.78); }
    .modal { width:min(580px,100%); max-height:88vh; overflow:auto; padding:20px; border:1px solid var(--border); border-radius:var(--radius); background:var(--panel); }
    .modal h2 { margin:0; font-size:17px; } .modal label { display:block; margin:12px 0 5px; color:var(--muted); font-size:12px; }
    .row { display:flex; gap:8px; align-items:center; } .row > input { flex:1; }
    .modal-actions { display:flex; justify-content:flex-end; gap:8px; margin-top:18px; }
    .fs-list { max-height:300px; overflow:auto; margin-top:10px; border:1px solid var(--border); border-radius:8px; background:var(--panel2); }
    .fs-item { width:100%; border-radius:0; border-bottom:1px solid var(--border); background:transparent; color:var(--fg); text-align:left; }
    .error { margin-top:10px; color:#fecaca; font-size:12px; }
    @media (max-width:720px) {
      header, .toolbar { padding:11px 13px; } main { padding:0 10px 16px; }
      header .spacer { display:none; width:100%; } header input { order:2; flex:1; min-width:150px; }
      .project summary { align-items:flex-start; flex-wrap:wrap; } .actions { width:100%; }
    }
  </style>
</head>
<body>
  <header>
    <h1>⚙️ ASO Runtime</h1>
    <span class="meta">Catálogo multi-repo</span>
    <span class="spacer"></span>
    <input id="token" aria-label="Token Bearer" placeholder="token (Bearer)" style="width:180px">
    <button id="login" class="ghost">Entrar</button>
    <button id="newProject" class="info">📁 Novo projeto</button>
    <button id="newOrchestration" class="ok">＋ Nova orquestração</button>
  </header>
  <div class="toolbar">
    <label><input id="showArchived" type="checkbox"> Exibir arquivados</label>
    <span id="stats" class="meta"></span>
  </div>
  <main id="content" aria-live="polite"><div class="empty">Carregando projetos…</div></main>

  <script>
    const COLS = ['Backlog','Ready','Planning','InProgress','WaitingAgent','WaitingHuman','Review','Testing','Blocked','Failed','Done','Archived'];
    let projects = [];
    let orchestrations = [];
    let cardsByOrchestration = {};
    let knownProjectIds = new Set();
    let currentPath = null;

    function token() { return localStorage.getItem('aso_token') || ''; }
    async function api(path, options) {
      const opts = options || {};
      const headers = Object.assign({}, opts.headers || {});
      if (token()) headers.Authorization = 'Bearer ' + token();
      const response = await fetch(path, Object.assign({}, opts, {headers}));
      if (!response.ok) {
        let detail = 'HTTP ' + response.status;
        try { detail = (await response.json()).detail || detail; } catch (_) {}
        throw new Error(detail);
      }
      if (response.status === 204) return null;
      return response.json();
    }
    function el(tag, className, text) {
      const node = document.createElement(tag);
      if (className) node.className = className;
      if (text !== undefined) node.textContent = text;
      return node;
    }
    function action(label, className, handler) {
      const button = el('button', className, label);
      button.type = 'button';
      button.addEventListener('click', function(event) { event.preventDefault(); event.stopPropagation(); handler(); });
      return button;
    }
    function closeOverlay(node) { if (node && node.parentNode) node.parentNode.removeChild(node); }

    async function load() {
      const content = document.getElementById('content');
      content.replaceChildren(el('div', 'empty', 'Carregando projetos…'));
      try {
        const include = document.getElementById('showArchived').checked;
        const loaded = await Promise.all([
          api('/v1/projects?include_archived=true'),
          api('/v1/orchestrations')
        ]);
        knownProjectIds = new Set(loaded[0].map(function(project) { return project.id; }));
        projects = include ? loaded[0] : loaded[0].filter(function(project) { return project.status === 'active'; });
        orchestrations = loaded[1];
        cardsByOrchestration = {};
        render();
      } catch (error) {
        content.replaceChildren(el('div', 'empty', 'Não foi possível carregar: ' + error.message));
      }
    }

    function render() {
      const content = document.getElementById('content');
      content.replaceChildren();
      projects.forEach(function(project) { content.appendChild(projectSection(project)); });
      const loose = orchestrations.filter(function(o) { return !o.project_id || !knownProjectIds.has(o.project_id); });
      if (loose.length) content.appendChild(projectSection(null, loose));
      if (!content.children.length) {
        const empty = el('div', 'empty');
        empty.appendChild(el('div', '', 'Nenhum projeto cadastrado.'));
        empty.appendChild(action('Criar primeiro projeto', 'info', function() { openProjectModal(); }));
        content.appendChild(empty);
      }
      const visibleProjects = new Set(projects.map(function(project) { return project.id; }));
      const visibleOrchestrations = orchestrations.filter(function(orchestration) {
        return !orchestration.project_id || visibleProjects.has(orchestration.project_id) || !knownProjectIds.has(orchestration.project_id);
      });
      document.getElementById('stats').textContent = projects.length + ' projeto(s) · ' + visibleOrchestrations.length + ' orquestração(ões)';
    }

    function projectSection(project, forcedOrchestrations) {
      const related = forcedOrchestrations || orchestrations.filter(function(o) { return o.project_id === project.id; });
      const details = el('details', 'project');
      const summary = el('summary');
      const title = el('div', 'project-title');
      title.appendChild(el('h2', '', project ? '📁 ' + project.name : '🗂️ Sem projeto (legado)'));
      const path = project && project.target_path ? ' · ' + project.target_path : '';
      title.appendChild(el('div', 'meta', (project ? project.description : 'Compatibilidade com orquestrações anteriores') + path + ' · ' + related.length + ' orquestração(ões)'));
      summary.appendChild(title);
      if (project && project.status === 'archived') summary.appendChild(el('span', 'pill archived', 'Arquivado'));
      const actions = el('div', 'actions');
      if (project && project.status === 'active') {
        actions.appendChild(action('Nova orquestração', 'ok sm', function() { location.href = '/ui/nova?project_id=' + encodeURIComponent(project.id); }));
        actions.appendChild(action('Editar', 'ghost sm', function() { openProjectModal(project); }));
        actions.appendChild(action('Arquivar', 'err sm', function() { archiveProject(project); }));
      } else if (project) {
        actions.appendChild(action('Restaurar', 'ok sm', function() { restoreProject(project); }));
      }
      if (project) actions.appendChild(action('Histórico', 'ghost sm', function() { showHistory(project); }));
      summary.appendChild(actions);
      details.appendChild(summary);
      let projectBoard = board(related);
      details.appendChild(projectBoard);
      let cardsLoaded = related.length === 0;
      details.addEventListener('toggle', async function() {
        if (!details.open || cardsLoaded) return;
        projectBoard.replaceChildren(el('div', 'empty', 'Carregando cards…'));
        const cardLists = await Promise.all(related.map(function(orchestration) {
          return api('/v1/orchestrations/' + encodeURIComponent(orchestration.id) + '/cards').catch(function() { return []; });
        }));
        related.forEach(function(orchestration, index) { cardsByOrchestration[orchestration.id] = cardLists[index]; });
        cardsLoaded = true;
        const loadedBoard = board(related);
        projectBoard.replaceWith(loadedBoard);
        projectBoard = loadedBoard;
      });
      return details;
    }

    function board(related) {
      const container = el('div', 'board');
      const orchMap = {};
      related.forEach(function(o) { orchMap[o.id] = o; });
      const cards = related.flatMap(function(o) {
        return (cardsByOrchestration[o.id] || []).map(function(card) { return {card:card, orchestration:o}; });
      });
      COLS.forEach(function(column) {
        const col = el('section', 'column');
        const items = cards.filter(function(item) { return item.card.status === column; });
        const heading = el('h3');
        heading.appendChild(el('span', '', column));
        heading.appendChild(el('span', '', String(items.length)));
        col.appendChild(heading);
        items.forEach(function(item) {
          const card = el('article', 'card');
          card.tabIndex = 0;
          card.appendChild(el('small', '', (item.card.phase || '') + ' · ' + (item.card.assignee || 'sem agente')));
          card.appendChild(el('strong', '', item.card.title));
          card.appendChild(el('small', '', (item.orchestration.user_request || item.orchestration.id).slice(0, 58)));
          function open() { location.href = '/ui/detalhe?id=' + encodeURIComponent(item.orchestration.id); }
          card.addEventListener('click', open);
          card.addEventListener('keydown', function(event) { if (event.key === 'Enter' || event.key === ' ') open(); });
          col.appendChild(card);
        });
        if (!items.length) col.appendChild(el('div', 'meta', '—'));
        container.appendChild(col);
      });
      return container;
    }

    function openProjectModal(project) {
      const overlay = el('div', 'overlay');
      const modal = el('div', 'modal');
      modal.setAttribute('role', 'dialog');
      modal.setAttribute('aria-modal', 'true');
      modal.appendChild(el('h2', '', project ? 'Editar projeto' : 'Novo projeto'));
      const name = el('input'); name.value = project ? project.name : ''; name.placeholder = 'Nome do projeto';
      const description = el('textarea'); description.value = project ? project.description : ''; description.placeholder = 'Descrição breve';
      const path = el('input'); path.value = project && project.target_path ? project.target_path : ''; path.placeholder = '/caminho/do/projeto';
      modal.appendChild(el('label', '', 'Nome *')); modal.appendChild(name);
      modal.appendChild(el('label', '', 'Descrição')); modal.appendChild(description);
      modal.appendChild(el('label', '', 'Pasta *'));
      const pathRow = el('div', 'row'); pathRow.appendChild(path); pathRow.appendChild(action('Procurar', 'ghost', function() { openFolderBrowser(path); })); modal.appendChild(pathRow);
      const error = el('div', 'error'); modal.appendChild(error);
      const actions = el('div', 'modal-actions');
      actions.appendChild(action('Cancelar', 'ghost', function() { closeOverlay(overlay); }));
      const save = action(project ? 'Salvar' : 'Criar', 'ok', async function() {
        save.disabled = true; error.textContent = '';
        try {
          const body = {name:name.value, description:description.value, target_path:path.value};
          if (project) {
            await api('/v1/projects/' + encodeURIComponent(project.id), {method:'PATCH', headers:{'content-type':'application/json'}, body:JSON.stringify(body)});
          } else {
            await api('/v1/projects', {method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify(body)});
          }
          closeOverlay(overlay); await load();
        } catch (cause) { error.textContent = cause.message; save.disabled = false; }
      });
      actions.appendChild(save); modal.appendChild(actions); overlay.appendChild(modal); document.body.appendChild(overlay); name.focus();
    }

    async function archiveProject(project) {
      if (!confirm('Arquivar "' + project.name + '"? As orquestrações e todo o histórico serão preservados.')) return;
      try { await api('/v1/projects/' + encodeURIComponent(project.id), {method:'DELETE'}); await load(); }
      catch (error) { alert(error.message); }
    }
    async function restoreProject(project) {
      const selected = prompt('Pasta para restaurar o projeto:', project.target_path || '');
      if (selected === null) return;
      try {
        await api('/v1/projects/' + encodeURIComponent(project.id) + '/restore', {method:'POST', headers:{'content-type':'application/json'}, body:JSON.stringify({target_path:selected})});
        await load();
      } catch (error) { alert(error.message); }
    }
    async function showHistory(project) {
      try {
        const events = await api('/v1/projects/' + encodeURIComponent(project.id) + '/events');
        const overlay = el('div', 'overlay'); const modal = el('div', 'modal');
        modal.appendChild(el('h2', '', 'Histórico · ' + project.name));
        events.forEach(function(event) { modal.appendChild(el('p', 'status', event.created_at + ' · ' + event.type + ' · ' + event.actor)); });
        if (!events.length) modal.appendChild(el('div', 'empty', 'Sem eventos.'));
        const actions = el('div', 'modal-actions'); actions.appendChild(action('Fechar', 'ghost', function() { closeOverlay(overlay); }));
        modal.appendChild(actions); overlay.appendChild(modal); document.body.appendChild(overlay);
      } catch (error) { alert(error.message); }
    }

    function openFolderBrowser(targetInput) {
      const overlay = el('div', 'overlay'); const modal = el('div', 'modal');
      modal.appendChild(el('h2', '', 'Selecionar pasta'));
      const current = el('div', 'status', 'Carregando…'); const list = el('div', 'fs-list');
      modal.appendChild(current); modal.appendChild(list);
      const actions = el('div', 'modal-actions');
      actions.appendChild(action('Acima', 'ghost', function() { navigateFolder(currentPath ? currentPath.substring(0, currentPath.lastIndexOf('/')) || '/' : '/', current, list); }));
      actions.appendChild(action('Usar esta pasta', 'ok', function() { if (currentPath) targetInput.value = currentPath; closeOverlay(overlay); }));
      actions.appendChild(action('Cancelar', 'ghost', function() { closeOverlay(overlay); }));
      modal.appendChild(actions); overlay.appendChild(modal); document.body.appendChild(overlay);
      navigateFolder(targetInput.value || null, current, list);
    }
    async function navigateFolder(path, current, list) {
      try {
        const data = await api('/v1/fs/dirs' + (path ? '?path=' + encodeURIComponent(path) : ''));
        currentPath = data.path; current.textContent = data.path; list.replaceChildren();
        data.dirs.forEach(function(directory) {
          list.appendChild(action('📁 ' + directory.name, 'fs-item', function() { navigateFolder(directory.path, current, list); }));
        });
        if (!data.dirs.length) list.appendChild(el('div', 'empty', 'Sem subpastas.'));
      } catch (error) { current.textContent = error.message; }
    }

    document.getElementById('token').value = token();
    document.getElementById('login').addEventListener('click', function() { localStorage.setItem('aso_token', document.getElementById('token').value.trim()); load(); });
    document.getElementById('showArchived').addEventListener('change', load);
    document.getElementById('newProject').addEventListener('click', function() { openProjectModal(); });
    document.getElementById('newOrchestration').addEventListener('click', function() { location.href = '/ui/nova'; });
    load();
  </script>
</body>
</html>
