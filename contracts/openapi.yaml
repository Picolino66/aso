openapi: 3.0.3
info:
  title: ASO Runtime API
  version: "1.0.0"
  description: >
    Contrato v1 (núcleo MVP-1) do ASO Runtime — Autonomous Software Orchestrator Runtime.
    Superfície completa catalogada em docs/api.md. Consistência forte; idempotência em criações.
servers:
  - url: /v1
tags:
  - name: orchestrations
  - name: kanban
  - name: agents
  - name: governance
  - name: workspace
  - name: projects
  - name: executors

paths:
  /projects:
    get:
      tags: [projects]
      summary: Lista o catálogo de projetos ativos por padrão
      parameters:
        - { in: query, name: include_archived, schema: { type: boolean, default: false } }
      responses:
        "200":
          description: Projetos visíveis
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/Project" } }
    post:
      tags: [projects]
      summary: Cadastra um projeto com path canônico e único
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateProject" }
      responses:
        "201": { description: Criado, content: { application/json: { schema: { $ref: "#/components/schemas/Project" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }

  /projects/{id}:
    get:
      tags: [projects]
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      responses:
        "200": { description: Projeto, content: { application/json: { schema: { $ref: "#/components/schemas/Project" } } } }
        "404": { $ref: "#/components/responses/Error" }
    patch:
      tags: [projects]
      summary: Atualiza metadados; o novo path vale somente para futuras orquestrações
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateProject" }
      responses:
        "200": { description: Atualizado, content: { application/json: { schema: { $ref: "#/components/schemas/Project" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
    put:
      tags: [projects]
      summary: Alias compatível de PATCH
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateProject" }
      responses:
        "200": { description: Atualizado, content: { application/json: { schema: { $ref: "#/components/schemas/Project" } } } }
    delete:
      tags: [projects]
      summary: Arquiva o projeto sem apagar suas orquestrações (admin)
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      responses:
        "200": { description: Arquivado, content: { application/json: { schema: { $ref: "#/components/schemas/Project" } } } }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }

  /projects/{id}/restore:
    post:
      tags: [projects]
      summary: Restaura um projeto, opcionalmente com novo path (admin)
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties: { target_path: { type: string, nullable: true } }
      responses:
        "200": { description: Restaurado, content: { application/json: { schema: { $ref: "#/components/schemas/Project" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "403": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }

  /projects/{id}/events:
    get:
      tags: [projects]
      summary: Lista o histórico append-only do projeto
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      responses:
        "200":
          description: Eventos em ordem cronológica
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/ProjectEvent" } }
        "404": { $ref: "#/components/responses/Error" }

  /fs/analyze/stream:
    get:
      tags: [workspace]
      summary: Pré-analisa uma pasta em modo somente leitura com progresso SSE
      parameters:
        - { in: query, name: path, required: true, schema: { type: string } }
      responses:
        "200":
          description: >
            Stream text/event-stream. Cada evento contém percent (0–100), current,
            total e file (caminho relativo ou null). Não cria git, docs ou orquestração.
          content:
            text/event-stream:
              schema: { type: string }
        "400": { $ref: "#/components/responses/Error" }

  /executors:
    get:
      tags: [executors]
      summary: Lista perfis e a compatibilidade conhecida com o runtime efetivo
      responses:
        "200":
          description: Catálogo sem valores de secrets
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/ExecutorProfile" } }

  /executors/sync:
    post:
      tags: [executors]
      summary: Sincroniza os modelos anunciados pelo Codex App Server (admin)
      responses:
        "200":
          description: Perfis gerenciados sincronizados; personalizados preservados
          content:
            application/json:
              schema: { type: array, items: { $ref: "#/components/schemas/ExecutorProfile" } }
        "403": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }

  /orchestrations:
    get:
      tags: [orchestrations]
      summary: Lista orquestrações
      parameters:
        - { in: query, name: project_id, schema: { type: string }, required: false }
        - { in: query, name: page, schema: { type: integer, minimum: 1 }, required: false }
        - { in: query, name: page_size, schema: { type: integer, minimum: 1, maximum: 500, default: 50 }, required: false }
      responses:
        "200":
          description: Lista simples sem page; página quando page é informado
          content:
            application/json:
              schema:
                oneOf:
                  - { type: array, items: { $ref: "#/components/schemas/Orchestration" } }
                  - { $ref: "#/components/schemas/OrchestrationPage" }
    post:
      tags: [orchestrations]
      summary: Cria orquestração e gera ExecutionPlan + contexto + board
      parameters:
        - { in: header, name: Idempotency-Key, schema: { type: string }, required: false }
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CreateOrchestration" } } }
      responses:
        "201": { description: Criada, content: { application/json: { schema: { $ref: "#/components/schemas/Orchestration" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }
        "422": { $ref: "#/components/responses/Error" }

  /orchestrations/{id}/pulls/{pr_id}/ci/run:
    post:
      tags: [governance]
      summary: Executa o comando de validação na branch candidata da PR
      parameters:
        - { $ref: "#/components/parameters/Id" }
        - { in: path, name: pr_id, required: true, schema: { type: string } }
      responses:
        "200": { description: CI executada; status passed ou failed registrado na PR }
        "409": { $ref: "#/components/responses/Error" }

  /orchestrations/{id}:
    get:
      tags: [orchestrations]
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { $ref: "#/components/schemas/Orchestration" } } } }
        "404": { $ref: "#/components/responses/Error" }

  /orchestrations/{id}/execution-settings:
    patch:
      tags: [orchestrations]
      summary: Corrige executor, esforço e gate de uma execução criada ou bloqueada
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ExecutionSettings" }
      responses:
        "200": { description: Configuração persistida e auditada, content: { application/json: { schema: { $ref: "#/components/schemas/Orchestration" } } } }
        "400": { $ref: "#/components/responses/Error" }
        "404": { $ref: "#/components/responses/Error" }
        "409": { $ref: "#/components/responses/Error" }

  /orchestrations/{id}/context:
    get:
      tags: [orchestrations]
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      responses:
        "200": { description: Contexto canônico versionado, content: { application/json: { schema: { $ref: "#/components/schemas/OrchestratorContext" } } } }

  /orchestrations/{id}/rollback:
    post:
      tags: [orchestrations]
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [to_snapshot], properties: { to_snapshot: { type: string, example: "O3" } } } } }
      responses:
        "202": { description: Rollback iniciado (gera ADR de rollback) }

  /boards/{id}/cards:
    get:
      tags: [kanban]
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      responses:
        "200": { description: OK, content: { application/json: { schema: { type: array, items: { $ref: "#/components/schemas/KanbanCard" } } } } }
    post:
      tags: [kanban]
      parameters: [ { $ref: "#/components/parameters/Id" }, { in: header, name: Idempotency-Key, schema: { type: string } } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/CreateCard" } } }
      responses:
        "201": { description: Card criado, content: { application/json: { schema: { $ref: "#/components/schemas/KanbanCard" } } } }

  /cards/{id}/move:
    post:
      tags: [kanban]
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [to_column], properties: { to_column: { $ref: "#/components/schemas/ColumnKey" } } } } }
      responses:
        "200": { description: Movido, content: { application/json: { schema: { $ref: "#/components/schemas/KanbanCard" } } } }

  /context-patches:
    post:
      tags: [governance]
      summary: Submete um ContextPatch ao ContextBus (pipeline de 7 etapas)
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ContextPatch" } } }
      responses:
        "200":
          description: Resultado do ContextBus
          content: { application/json: { schema: { type: object, properties: { status: { type: string, enum: [applied, rejected, queued_conflict] }, conflict: { $ref: "#/components/schemas/Conflict" } } } } }

  /orchestrations/{id}/quality-gates/run:
    post:
      tags: [governance]
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { type: object, required: [phase], properties: { phase: { type: string, example: "F3" } } } } }
      responses:
        "200": { description: Resultado do gate, content: { application/json: { schema: { $ref: "#/components/schemas/QualityGateResult" } } } }

  /orchestrations/{id}/adrs:
    post:
      tags: [governance]
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      requestBody:
        required: true
        content: { application/json: { schema: { $ref: "#/components/schemas/ADR" } } }
      responses:
        "201": { description: ADR criada, content: { application/json: { schema: { $ref: "#/components/schemas/ADR" } } } }

  /approvals/{id}/approve:
    post:
      tags: [governance]
      parameters: [ { $ref: "#/components/parameters/Id" } ]
      responses:
        "200": { description: Aprovado, content: { application/json: { schema: { $ref: "#/components/schemas/HumanApproval" } } } }

components:
  parameters:
    Id:
      in: path
      name: id
      required: true
      schema: { type: string }
  responses:
    Error:
      description: Erro
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
  schemas:
    Error:
      type: object
      properties:
        type: { type: string }
        title: { type: string }
        status: { type: integer }
        detail: { type: string }
        instance: { type: string }
    ColumnKey:
      type: string
      enum: [Backlog, Ready, Planning, InProgress, WaitingAgent, WaitingHuman, Review, Testing, Blocked, Failed, Done, Archived]
    ExecutionMode:
      type: string
      enum: [full-pipeline, feature-evolution, architecture-review, code-execution, incident-response, phase-resume]
    Phase:
      type: string
      enum: [F1, F2, F3, F4, F5, F6, F7]
    CreateOrchestration:
      type: object
      required: [user_request]
      properties:
        project_id: { type: string, nullable: true }
        target_path: { type: string, nullable: true, description: "Compatibilidade; se project_id existir deve coincidir com o path canônico." }
        user_request: { type: string }
        execution_mode: { $ref: "#/components/schemas/ExecutionMode" }
        executor: { type: string, nullable: true }
        effort: { type: string, nullable: true, enum: [low, medium, high, xhigh, max, ultra] }
        validation_command: { type: string, nullable: true }
    ExecutionSettings:
      type: object
      properties:
        executor: { type: string, nullable: true }
        effort: { type: string, nullable: true, enum: [low, medium, high, xhigh, max, ultra] }
        validation_command: { type: string, nullable: true, description: "Teste, lint ou build finito; servidores e watch são rejeitados." }
    ExecutorProfile:
      type: object
      properties:
        name: { type: string }
        kind: { type: string, enum: [mock, cli, llm] }
        provider: { type: string }
        model: { type: string }
        effort: { type: string }
        supported_efforts: { type: array, items: { type: string } }
        is_default: { type: boolean }
        managed_by: { type: string, description: "codex quando sincronizado pelo runtime" }
        available: { type: boolean }
        availability_reason: { type: string }
        runtime_version: { type: string }
    ProjectStatus:
      type: string
      enum: [active, archived]
    Project:
      type: object
      required: [id, name, description, status, created_at, updated_at]
      properties:
        id: { type: string }
        name: { type: string }
        description: { type: string }
        target_path: { type: string, nullable: true, description: "Nulo somente em legado arquivado com conflito de migração." }
        status: { $ref: "#/components/schemas/ProjectStatus" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        archived_at: { type: string, format: date-time, nullable: true }
    CreateProject:
      type: object
      required: [name, target_path]
      properties:
        name: { type: string }
        description: { type: string, default: "" }
        target_path: { type: string }
    UpdateProject:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        target_path: { type: string }
    ProjectEvent:
      type: object
      properties:
        id: { type: string }
        project_id: { type: string }
        type: { type: string, enum: [ProjectCreated, ProjectUpdated, ProjectArchived, ProjectRestored, LegacyProjectBackfilled] }
        actor: { type: string }
        before: { type: object }
        after: { type: object }
        created_at: { type: string, format: date-time }
    Orchestration:
      type: object
      properties:
        id: { type: string }
        project_id: { type: string, nullable: true }
        target_path: { type: string, nullable: true }
        selected_executor: { type: string, nullable: true }
        selected_effort: { type: string, nullable: true }
        validation_command: { type: string, nullable: true }
        workspace_prepared: { type: boolean }
        execution_mode: { $ref: "#/components/schemas/ExecutionMode" }
        current_phase: { $ref: "#/components/schemas/Phase" }
        snapshot_version: { type: string, example: "O2" }
        status: { type: string, enum: [created, running, blocked, waiting_human, completed, cancelled, rolled_back] }
        user_request: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    OrchestrationPage:
      type: object
      properties:
        items: { type: array, items: { $ref: "#/components/schemas/Orchestration" } }
        total: { type: integer }
        page: { type: integer }
        page_size: { type: integer }
    OrchestratorContext:
      type: object
      properties:
        id: { type: string }
        orchestration_id: { type: string }
        version: { type: integer }
        current_phase: { $ref: "#/components/schemas/Phase" }
        snapshot_version: { type: string }
        payload: { type: object, description: "Estrutura canônica §17 (product, architecture, contracts, ...)" }
        context_hash: { type: string }
    CreateCard:
      type: object
      required: [type, title, phase]
      properties:
        type: { $ref: "#/components/schemas/CardType" }
        title: { type: string }
        description: { type: string }
        phase: { $ref: "#/components/schemas/Phase" }
        priority: { type: string, enum: [low, medium, high, critical] }
        acceptance_criteria: { type: array, items: { type: string } }
    CardType:
      type: string
      enum: [Epic, Feature, Task, Bug, TechDebt, ADRTask, Research, Review, Test, Documentation, Deploy, Incident, Improvement]
    KanbanCard:
      type: object
      properties:
        id: { type: string }
        board_id: { type: string }
        orchestration_id: { type: string }
        phase: { $ref: "#/components/schemas/Phase" }
        type: { $ref: "#/components/schemas/CardType" }
        title: { type: string }
        description: { type: string }
        status: { $ref: "#/components/schemas/ColumnKey" }
        priority: { type: string, enum: [low, medium, high, critical] }
        assignee_type: { type: string, enum: [human, agent, multi_agent] }
        assignee: { type: string, nullable: true }
        dependencies: { type: array, items: { type: string } }
        blocked_by: { type: array, items: { type: string } }
        acceptance_criteria: { type: array, items: { type: string } }
        linked_adrs: { type: array, items: { type: string } }
        worktree: { type: string, nullable: true }
        branch: { type: string, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
    ContextPatch:
      type: object
      required: [orchestration_id, agent, phase, patch_type, target_path]
      properties:
        id: { type: string }
        orchestration_id: { type: string }
        card_id: { type: string, nullable: true }
        agent: { type: string }
        phase: { $ref: "#/components/schemas/Phase" }
        patch_type: { type: string, enum: [add, update, propose, remove] }
        target_path: { type: string, example: "architecture.modules.pdf" }
        content: { type: object }
        evidence: { type: array, items: { type: string } }
        risks: { type: array, items: { type: string } }
        requires_adr: { type: boolean }
        requires_approval: { type: boolean }
    Conflict:
      type: object
      properties:
        id: { type: string }
        type:
          type: string
          enum: [ARCHITECTURE_CONFLICT, CONTRACT_CONFLICT, SECURITY_CONFLICT, DATA_MODEL_CONFLICT, SCOPE_CONFLICT, SNAPSHOT_LOCK_CONFLICT, QUALITY_GATE_CONFLICT, TOOL_PERMISSION_CONFLICT, AGENT_OUTPUT_CONFLICT, KANBAN_DEPENDENCY_CONFLICT, PR_CONFLICT, CI_CONFLICT, REVIEW_CONFLICT]
        description: { type: string }
        status: { type: string, enum: [open, resolved, escalated] }
    QualityGateResult:
      type: object
      properties:
        id: { type: string }
        orchestration_id: { type: string }
        phase: { $ref: "#/components/schemas/Phase" }
        status: { type: string, enum: [PASSED, FAILED, WARNING] }
        criteria:
          type: array
          items:
            type: object
            properties:
              name: { type: string }
              status: { type: string, enum: [PASSED, FAILED] }
              evidence: { type: array, items: { type: string } }
              failure_reason: { type: string, nullable: true }
        blocking_issues: { type: array, items: { type: string } }
        warnings: { type: array, items: { type: string } }
    ADR:
      type: object
      properties:
        id: { type: string, example: "ADR-0001" }
        title: { type: string }
        status: { type: string, enum: [proposed, accepted, superseded, rejected, deprecated] }
        context: { type: string }
        options_considered: { type: array, items: { type: object } }
        decision: { type: string }
        rationale: { type: string }
        tradeoffs: { type: array, items: { type: string } }
        consequences: { type: array, items: { type: string } }
        phase: { $ref: "#/components/schemas/Phase" }
    HumanApproval:
      type: object
      properties:
        id: { type: string }
        orchestration_id: { type: string }
        card_id: { type: string, nullable: true }
        requested_by_agent: { type: string }
        action: { type: string }
        risk: { type: string, enum: [medium, high, critical] }
        reason: { type: string }
        status: { type: string, enum: [pending, approved, rejected] }
